name: kidobum agent

on:
  schedule:
    # Runs at 12:00 UTC (5:30 PM IST)
    - cron: '0 12 * * *'
    # Runs at 21:00 UTC (2:30 AM IST - US High Peak Time)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install requests openai google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client python-dotenv playwright
          playwright install chromium
          playwright install-deps

      - name: Create secret files from GitHub Secrets
        run: |
          echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Run Automation Bot
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIKTOK_AUTH_STATE: ${{ secrets.TIKTOK_AUTH_STATE }}
          TIKTOK_AUTH_STATE_B64: ${{ secrets.TIKTOK_AUTH_STATE_B64 }}
        run: python main.py
